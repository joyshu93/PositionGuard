name = "position-guard"
main = "src/index.ts"
compatibility_date = "2026-03-30"
compatibility_flags = ["nodejs_compat"]
minify = false

[[d1_databases]]
binding = "DB"
database_name = "position-guard"
database_id = "replace-with-your-d1-database-id"
migrations_dir = "migrations"

[triggers]
crons = ["0 * * * *"]

